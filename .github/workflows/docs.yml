name: docs

on:
  push:
    branches: [master, main]
    paths:
      - "website/**"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "website/**"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Sync changelog into website content
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("CHANGELOG.md").read_text()
          text = re.sub(r"\]\(docs/([^)]+)\)", r"](/\1/)", text)
          text = re.sub(
              r"\]\(LICENSE\)",
              r"](https://github.com/inja-online/llm-gateway/blob/master/LICENSE)",
              text,
          )
          # Drop a leading H1 if present — layout already renders the title.
          text = re.sub(r"^#\s+[^\n]+\n+", "", text, count=1)

          frontmatter = """---
          title: Changelog
          description: Release history
          group: project
          order: 31
          ---

          """.replace("          ", "")

          out = Path("website/src/content/docs/changelog.md")
          out.write_text(frontmatter + text)
          print(f"wrote {out} ({out.stat().st_size} bytes)")
          PY

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Build Astro site
        working-directory: website
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
