name: ci

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build
        run: go build -o /tmp/llm-gateway ./cmd/gateway

      - name: Vet
        run: go vet ./...

      - name: Unit + smoke tests (race)
        run: go test -race -count=1 ./...

      - name: Coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic -count=1
          go tool cover -func=coverage.out | tee coverage.txt
          total=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          # Overall floor (includes interactive subauth OAuth browser/device flows).
          awk -v t="$total" 'BEGIN { if (t+0 < 85.0) { printf "coverage %.1f%% is below 85%% threshold\n", t; exit 1 } }'
          # Core packages (proxy/config/ingress/egress/hooks) must stay very high.
          go test ./config/ ./proxy/ ./hooks/... ./ingress/... ./egress/... \
            -coverprofile=coverage-core.out -covermode=atomic -count=1
          core=$(go tool cover -func=coverage-core.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "Core coverage: ${core}%"
          # proxy surface is large; keep core (config/proxy/ingress/egress/hooks) ≥ 89%.
          awk -v t="$core" 'BEGIN { if (t+0 < 89.0) { printf "core coverage %.1f%% is below 89%% threshold\n", t; exit 1 } }'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  smoke-binary:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build binary
        run: go build -o llm-gateway ./cmd/gateway

      - name: Write smoke config
        run: |
          cat > gateway.yaml <<'YAML'
          listen: "127.0.0.1:18787"
          providers:
            mock: { kind: openai_compat, base_url: "http://127.0.0.1:9" }
          defaults:
            openai_dialect: mock
          hooks:
            jsonl: { output: stderr }
          YAML

      - name: Start gateway and hit healthz
        run: |
          ./llm-gateway -config gateway.yaml &
          pid=$!
          trap 'kill $pid' EXIT
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18787/healthz" | grep -q ok; then
              echo "healthz ok"
              exit 0
            fi
            sleep 0.1
          done
          echo "gateway did not become healthy"
          exit 1

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t llm-gateway:ci .
      - name: Run container healthz
        run: |
          cat > /tmp/gw.yaml <<'YAML'
          listen: ":8787"
          providers:
            mock: { kind: openai_compat, base_url: "http://127.0.0.1:9" }
          defaults:
            openai_dialect: mock
          hooks:
            jsonl: { output: stdout }
          YAML
          docker run -d --name gw -p 18788:8787 \
            -v /tmp/gw.yaml:/config/gateway.yaml:ro \
            -e GATEWAY_LISTEN=:8787 \
            llm-gateway:ci
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18788/healthz" | grep -q ok; then
              echo "container healthz ok"
              docker rm -f gw
              exit 0
            fi
            sleep 0.2
          done
          docker logs gw || true
          docker rm -f gw || true
          exit 1
