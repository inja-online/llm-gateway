# Claude Code + consumer subscription OAuth (ChatGPT, Claude, SuperGrok).
#
# 1) Log in once per provider (browser / device code / setup-token):
#      go build -o llm-gateway ./cmd/gateway
#      ./llm-gateway auth login chatgpt    # ChatGPT Plus/Pro via Codex OAuth
#      ./llm-gateway auth login claude     # Claude Pro/Max setup-token
#      ./llm-gateway auth login grok       # SuperGrok / X Premium+ device code
#      ./llm-gateway auth status
#
# 2) Start gateway:
#      ./llm-gateway -config examples/configs/claude-code-subscriptions.yaml
#
# 3) Point Claude Code at the gateway — any provider combo:
#      KEY=local-dev ./examples/claude-code-multi.sh multi       # Claude+GPT+Grok
#      KEY=local-dev ./examples/claude-code-multi.sh gpt         # GPT only
#      KEY=local-dev ./examples/claude-code-multi.sh grok        # Grok 4.5 + composer-2.5
#      KEY=local-dev ./examples/claude-code-multi.sh gpt+grok    # no Claude
#
# Tokens: ~/.config/inja-gateway/credentials.json (0600)
# Override path: INJA_GATEWAY_AUTH_FILE
#
# ToS: use only accounts you own. ChatGPT Codex OAuth is documented for tools
# that integrate with it; Claude Free/Pro/Max OAuth is restricted by Anthropic
# for many third-party products — prefer setup-token / official Claude Code
# flows and re-read Anthropic's terms. xAI may gate OAuth API by subscription tier.

# Bind loopback; helpers enable HTTPS via GATEWAY_TLS_CERT/KEY or tls: below.
# Generate certs:  ./examples/scripts/gen-localhost-tls.sh
listen: "127.0.0.1:8787"

# Uncomment after gen-localhost-tls.sh (or rely on env from cc-gateway-up):
# tls:
#   cert_file: examples/certs/localhost.pem
#   key_file: examples/certs/localhost-key.pem

providers:
  # ChatGPT subscription → Codex OAuth bearer (refresh via auth store).
  # Prefer Responses models; chat translate from Claude Code uses openai_compat paths.
  chatgpt:
    kind: openai_compat
    base_url: "https://chatgpt.com/backend-api/codex"
    auth: oauth2
    oauth:
      credentials: chatgpt
    capabilities:
      text: true

  # Claude subscription / setup-token → Bearer upstream (not x-api-key).
  anthropic:
    kind: anthropic
    base_url: "https://api.anthropic.com/v1"
    auth: oauth2
    oauth:
      credentials: claude

  # SuperGrok / X Premium+ OAuth → api.x.ai
  xai:
    kind: openai_compat
    base_url: "https://api.x.ai/v1"
    auth: oauth2
    oauth:
      credentials: grok
    capabilities:
      text: true

defaults:
  anthropic_dialect: anthropic
  openai_dialect: chatgpt

# Model aliases (updated 2026-07-23). Targets are vendor API ids under provider/.
# Re-check: platform.claude.com/docs · openai.com/index/gpt-5-6 · docs.x.ai/developers/models
# If an id 404s for your plan, change the target only — keep short alias names stable.
aliases:
  # --- Claude (API: claude-sonnet-5 / claude-opus-4-8 / claude-haiku-4-5) ---
  claude: anthropic/claude-sonnet-5
  sonnet: anthropic/claude-sonnet-5
  opus: anthropic/claude-opus-4-8
  haiku: anthropic/claude-haiku-4-5
  fable: anthropic/claude-fable-5

  # --- ChatGPT / Codex (GPT-5.6 Sol / Terra / Luna) ---
  gpt: chatgpt/gpt-5.6-terra          # everyday / Codex default tier
  terra: chatgpt/gpt-5.6-terra
  sol: chatgpt/gpt-5.6-sol            # flagship
  gpt-heavy: chatgpt/gpt-5.6-sol
  luna: chatgpt/gpt-5.6-luna          # fast / cheap
  gpt-mini: chatgpt/gpt-5.6-luna
  gpt-5.6: chatgpt/gpt-5.6-sol        # bare gpt-5.6 usually means Sol

  # --- xAI (docs.x.ai: grok-4.5 flagship; grok-build-0.1 = Grok Build / Composer-class) ---
  grok: xai/grok-4.5
  grok-4.5: xai/grok-4.5
  grok-4.3: xai/grok-4.3
  # Grok Build coding tier (UI may say "Composer 2.5")
  composer: xai/grok-build-0.1
  composer-2.5: xai/grok-build-0.1
  grok-build: xai/grok-build-0.1
  grok-composer: xai/grok-build-0.1

  # --- Cursor coexistence (prefixed names) ---
  # Cursor keeps its own built-ins (e.g. "Claude Fable 5", Composer 2.5, Cursor Grok).
  # Add these as custom OpenAI models so the picker shows BOTH sides without name clashes:
  #   Claude Fable 5     → Cursor subscription / Cursor routing
  #   claude/fable-5     → your Claude sub via llm-gateway
  # Prefer prefixes claude/ chatgpt/ grok/ inja/ — never bare names that match Cursor UI labels.
  claude/sonnet: anthropic/claude-sonnet-5
  claude/sonnet-5: anthropic/claude-sonnet-5
  claude/opus: anthropic/claude-opus-4-8
  claude/opus-4-8: anthropic/claude-opus-4-8
  claude/haiku: anthropic/claude-haiku-4-5
  claude/haiku-4-5: anthropic/claude-haiku-4-5
  claude/fable: anthropic/claude-fable-5
  claude/fable-5: anthropic/claude-fable-5
  chatgpt/gpt: chatgpt/gpt-5.6-terra
  chatgpt/terra: chatgpt/gpt-5.6-terra
  chatgpt/sol: chatgpt/gpt-5.6-sol
  chatgpt/luna: chatgpt/gpt-5.6-luna
  chatgpt/gpt-5.6-terra: chatgpt/gpt-5.6-terra
  chatgpt/gpt-5.6-sol: chatgpt/gpt-5.6-sol
  chatgpt/gpt-5.6-luna: chatgpt/gpt-5.6-luna
  grok/4.5: xai/grok-4.5
  grok/grok-4.5: xai/grok-4.5
  grok/build: xai/grok-build-0.1
  grok/composer: xai/grok-build-0.1
  grok/composer-2.5: xai/grok-build-0.1
  # Generic "this is llm-gateway" namespace (same targets)
  inja/sonnet: anthropic/claude-sonnet-5
  inja/opus: anthropic/claude-opus-4-8
  inja/haiku: anthropic/claude-haiku-4-5
  inja/fable: anthropic/claude-fable-5
  inja/fable-5: anthropic/claude-fable-5
  inja/gpt: chatgpt/gpt-5.6-terra
  inja/terra: chatgpt/gpt-5.6-terra
  inja/sol: chatgpt/gpt-5.6-sol
  inja/luna: chatgpt/gpt-5.6-luna
  inja/grok: xai/grok-4.5
  inja/grok-4.5: xai/grok-4.5
  inja/composer: xai/grok-build-0.1
  inja/composer-2.5: xai/grok-build-0.1

# Optional: require a shared edge key from Claude Code; upstream stays subscription OAuth.
# edge_auth:
#   enabled: true
#   keys: ["local-dev"]

hooks:
  jsonl:
    output: stdout
