# Minimal Kubernetes deploy: ConfigMap + Deployment + Service.
#
#   kubectl apply -f deploy/k8s/gateway.yaml
#   kubectl -n llm-gateway port-forward svc/llm-gateway 8787:8787
#
# Scale:  kubectl -n llm-gateway scale deploy/llm-gateway --replicas=3
# Logs:   kubectl -n llm-gateway logs -l app=llm-gateway -f
#
# Usage events go to stdout (JSONL) — ship them with your platform log agent.
# For multi-replica billing, point hooks.webhook at your ingest URL instead.

apiVersion: v1
kind: Namespace
metadata:
  name: llm-gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway
  namespace: llm-gateway
data:
  gateway.yaml: |
    listen: ":8787"
    providers:
      openai:
        kind: openai
        base_url: "https://api.openai.com/v1"
        # api_key_env: OPENAI_API_KEY
      anthropic:
        kind: anthropic
        base_url: "https://api.anthropic.com/v1"
        # api_key_env: ANTHROPIC_API_KEY
      google:
        kind: google
        base_url: "https://generativelanguage.googleapis.com/v1beta"
        # api_key_env: GEMINI_API_KEY
      google_openai:
        kind: openai_compat
        base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
        # api_key_env: GEMINI_API_KEY
      openrouter:
        kind: openai_compat
        base_url: "https://openrouter.ai/api/v1"
    defaults:
      openai_dialect: openai
      anthropic_dialect: anthropic
      google_dialect: google
    aliases:
      fast: openrouter/auto
      gemini: google/gemini-2.0-flash
    hooks:
      jsonl:
        output: stdout
      # webhook:
      #   url: "http://billing.billing.svc/ingest"
      #   timeout: 3s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: llm-gateway
  labels:
    app: llm-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: gateway
          image: ghcr.io/inja-online/llm-gateway:latest
          imagePullPolicy: IfNotPresent
          args: ["-config", "/config/gateway.yaml"]
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: GATEWAY_LISTEN
              value: ":8787"
            # Optional: server-held keys from a Secret you create.
            # - name: OPENAI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: llm-gateway-keys
            #       key: openai
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: llm-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: llm-gateway
spec:
  selector:
    app: llm-gateway
  ports:
    - name: http
      port: 8787
      targetPort: http
  type: ClusterIP
