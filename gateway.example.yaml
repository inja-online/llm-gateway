# Inja LLM Gateway (llm-gateway) example config.
# Copy to gateway.yaml and edit providers / keys / hooks.
#
# Cloud tip: keep hooks.jsonl.output: stdout and ship logs with your platform.
# Multi-replica billing: set hooks.webhook.url instead of (or in addition to) a file.
#
# Client dialects (ingress):
#   OpenAI     POST /v1/chat/completions
#              (also used by Gemini OpenAI-compat clients — same wire format)
#              POST /v1/responses   GET|DELETE /v1/responses/{id}?provider=...
#              POST|GET|DELETE /v1/files[...]   POST /v1/moderations
#              POST /v1/images/generations|edits|variations
#              POST /v1/videos   GET /v1/videos/{id}?provider=...
#              GET  /v1/realtime?model=...   (WebSocket; requires capabilities.realtime)
#   Anthropic  POST /v1/messages
#              POST /v1/messages/count_tokens  (proxy / Google translate / estimate)
#   Google     POST /v1beta/models/{model}:generateContent          (native chat / image-in-chat)
#              POST /v1beta/models/{model}:streamGenerateContent    (native)
#              POST /v1beta/models/{model}:countTokens              (native; no usage event)
#              GET  /v1beta/models[/{model}]  (?provider= or defaults.google_dialect)
#              GET  /v1beta/models/{model}:bidiGenerateContent      (Live WS skeleton)
#
# Provider kinds (egress):
#   openai / openai_compat  — Chat + Responses + Files + Moderations + images + videos
#                             (set base_url to Gemini …/v1beta/openai for google_openai)
#                             openai_compat: set capabilities.realtime/image_gen/... to opt in
#   anthropic               — Messages API (chat only)
#   google                  — native Gemini generateContent / countTokens / models list
#   google                  — native Gemini generateContent (+ Live when realtime)

listen: ":8787"   # override with env GATEWAY_LISTEN=0.0.0.0:8787

providers:
  # --- First-party / native kinds ---
  openai:
    kind: openai
    base_url: "https://api.openai.com/v1"
    # api_key_env: OPENAI_API_KEY

  anthropic:
    kind: anthropic
    base_url: "https://api.anthropic.com/v1"
    # api_key_env: ANTHROPIC_API_KEY

  # Native Gemini (generateContent). Auth: x-goog-api-key
  google:
    kind: google
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    # api_key_env: GEMINI_API_KEY

  # Gemini via OpenAI-compatible endpoint. Auth: Bearer
  # openai_compat defaults to text-only; opt in for image/video media routes.
  google_openai:
    kind: openai_compat
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    # api_key_env: GEMINI_API_KEY
    capabilities:
      text: true
      image_gen: true
      video_gen: true
      # audio_speech: false
      # audio_transcribe: false
      # realtime: false

  # Vertex AI (Gemini on GCP) — native generateContent with OAuth2 / ADC.
  # Confirm region + project endpoints in Google Cloud docs (dated 2026-07).
  # auth: adc|service_account → Authorization: Bearer from TokenSource.
  # Binary auto-wires SA JWT from service_account_file (or GOOGLE_APPLICATION_CREDENTIALS).
  # Library mode may still inject via proxy.Server.SetTokenSource. No cloud SDK bundled.
  # Mount SA JSON read-only when used.
  # vertex:
  #   kind: google
  #   base_url: "https://us-central1-aiplatform.googleapis.com/v1/projects/PROJECT/locations/us-central1/publishers/google"
  #   auth: service_account
  #   service_account_file: /secrets/vertex-sa.json
  #   # api_key_env:  # unused for TokenSource modes

  # OAuth2 client credentials / refresh_token (#104) — any kind; Bearer upstream.
  # Prefer *_env for secrets. grant auto: refresh when refresh_token(_env) set.
  # openai_oauth:
  #   kind: openai
  #   base_url: "https://api.openai.com/v1"
  #   auth: oauth2
  #   oauth:
  #     token_url: "https://oauth.example.com/token"
  #     client_id_env: OPENAI_OAUTH_CLIENT_ID
  #     client_secret_env: OPENAI_OAUTH_CLIENT_SECRET
  #     # refresh_token_env: OPENAI_OAUTH_REFRESH_TOKEN
  #     scopes: ["api"]

  # Multi-tenant: edge auth + forward each client's OAuth access token upstream.
  # openai_user_oauth:
  #   kind: openai
  #   base_url: "https://api.openai.com/v1"
  #   auth: client_bearer
  #   # api_key_env is ignored in client_bearer mode

  # WIF / sidecar access token file (#164) — see docs/wif-recipes.md
  # openai_wif:
  #   kind: openai
  #   base_url: "https://api.openai.com/v1"
  #   auth: adc
  #   token_file: /var/run/secrets/openai-access-token

  # --- OpenAI-compatible hosts (kind: openai_compat) ---
  deepseek:
    kind: openai_compat
    base_url: "https://api.deepseek.com"
    # api_key_env: DEEPSEEK_API_KEY
  # FIM (experimental): POST gateway /v1/completions or /beta/completions
  # (DeepSeek beta Completions; gateway rewrites …/v1 → …/beta on /beta path).

  # OpenRouter — openai_compat; optional client headers HTTP-Referer + X-Title
  # are forwarded. Body fields (provider, plugins, route, …) pass through.
  # Image/video models: set capabilities.image_gen / video_gen true (defaults off).
  openrouter:
    kind: openai_compat
    base_url: "https://openrouter.ai/api/v1"
    # api_key_env: OPENROUTER_API_KEY
    # capabilities:
    #   text: true
    #   image_gen: true

  # xAI (Grok) — openai_compat Chat + Responses; Imagine images need image_gen.
  # Full guide: docs/providers/xai.md (updated 2026-07-21). Vendor: docs.x.ai — checked 2026-07.
  # Alias example: grok → xai/grok-3. Opt-in capabilities for images/video/voice if needed.
  xai:
    kind: openai_compat
    base_url: "https://api.x.ai/v1"
    # api_key_env: XAI_API_KEY
    # capabilities:
    #   text: true
    #   image_gen: true    # /v1/images/* Imagine-style
    #   video_gen: false
    #   audio_speech: false
    #   realtime: false

  # Moonshot / Kimi (use the regional base that matches your key).
  # Helpers proxied when defaults.openai_dialect or ?provider= points here (#89/#137):
  #   POST /v1/tokenizers/estimate-token-count
  #   GET  /v1/users/me/balance
  moonshot:
    kind: openai_compat
    base_url: "https://api.moonshot.ai/v1"
    # api_key_env: MOONSHOT_API_KEY
  # moonshot_cn:
  #   kind: openai_compat
  #   base_url: "https://api.moonshot.cn/v1"

  # Zhipu / Z.AI (GLM) — pick the regional OpenAI-compat base that matches your key.
  # Wrong region ⇒ auth fail. Full guide: docs/providers/zai.md (updated 2026-07-21).
  # Vendor docs (verify hosts): docs.z.ai (intl) · open.bigmodel.cn/dev/api (CN) — checked 2026-07.
  # kind: openai_compat → Bearer; media/realtime OFF unless capabilities.* set.
  # International (example):
  zai:
    kind: openai_compat
    base_url: "https://api.z.ai/api/paas/v4"
    # api_key_env: ZAI_API_KEY
  # China / BigModel OpenAI-compat (example alternate — uncomment one region only):
  # zai_cn:
  #   kind: openai_compat
  #   base_url: "https://open.bigmodel.cn/api/paas/v4"
  #   # api_key_env: ZAI_API_KEY
  # openai_compat media defaults off (text only) unless capabilities set.

  # Groq — fast openai_compat. STT-first multi-provider pattern:
  # set capabilities.audio_transcribe: true and call models as groq/<whisper-model>
  # (or alias whisper-fast). Keep chat on defaults.openai_dialect (e.g. openai).
  # Full guide: docs/providers/groq-stt.md (updated 2026-07-21). console.groq.com/docs — 2026-07.
  groq:
    kind: openai_compat
    base_url: "https://api.groq.com/openai/v1"
    # api_key_env: GROQ_API_KEY
    # capabilities:
    #   text: true
    #   audio_transcribe: true   # required for /v1/audio/transcriptions|translations
    #   audio_speech: false

  together:
    kind: openai_compat
    base_url: "https://api.together.xyz/v1"
    # api_key_env: TOGETHER_API_KEY

  fireworks:
    kind: openai_compat
    base_url: "https://api.fireworks.ai/inference/v1"
    # api_key_env: FIREWORKS_API_KEY

  mistral:
    kind: openai_compat
    base_url: "https://api.mistral.ai/v1"
    # api_key_env: MISTRAL_API_KEY

  perplexity:
    kind: openai_compat
    base_url: "https://api.perplexity.ai"
    # api_key_env: PERPLEXITY_API_KEY

  cerebras:
    kind: openai_compat
    base_url: "https://api.cerebras.ai/v1"
    # api_key_env: CEREBRAS_API_KEY

  deepinfra:
    kind: openai_compat
    base_url: "https://api.deepinfra.com/v1/openai"
    # api_key_env: DEEPINFRA_API_KEY

  siliconflow:
    kind: openai_compat
    base_url: "https://api.siliconflow.cn/v1"
    # api_key_env: SILICONFLOW_API_KEY

  # Alibaba DashScope (Qwen) OpenAI-compatible mode.
  # Use the region that matches your DashScope key; path MUST include compatible-mode.
  # Full guide: docs/providers/qwen.md (updated 2026-07-21).
  # Vendor: help.aliyun.com DashScope OpenAI compatible — checked 2026-07.
  # CN (default example):
  qwen:
    kind: openai_compat
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    # api_key_env: DASHSCOPE_API_KEY
  # International (example alternate):
  # qwen_intl:
  #   kind: openai_compat
  #   base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
  #   # api_key_env: DASHSCOPE_API_KEY
  # Model ids are often bare (qwen-turbo, qwen-plus) or with provider prefix:
  #   qwen/qwen-turbo  |  aliases below (qwen-turbo / qwen-plus).

  # Local / self-hosted (uncomment and point at your server)
  # vllm:
  #   kind: openai_compat
  #   base_url: "http://127.0.0.1:8000/v1"
  # ollama:
  #   kind: openai_compat
  #   base_url: "http://127.0.0.1:11434/v1"
  # lmstudio:
  #   kind: openai_compat
  #   base_url: "http://127.0.0.1:1234/v1"

defaults:
  openai_dialect: openai
  anthropic_dialect: anthropic
  google_dialect: google

# When true, cross-dialect translate responses include X-Gateway-Dropped-Fields
# (names only) and usage events get dropped_fields. Default off (#152).
# observe_dropped_fields: true

# Optional Anthropic cache_control injection on OpenAI/Google → Anthropic translate.
# Default off. Client-supplied cache_control always wins. See docs/cache-control-policy.md.
# caching:
#   auto_breakpoints:
#     enabled: true
#     min_chars: 2048          # default 2048
#     targets: [system, tools] # default both; system | tools only

# Optional upstream provider probes (GET /v1/health/providers). Default off.
# Distinct from GET /healthz process liveness. Never logs API keys (#94/#153).
# health_checks:
#   enabled: true
#   timeout: 2s

aliases:
  fast: deepseek/deepseek-chat
  grok: xai/grok-3
  gemini: google/gemini-2.0-flash
  kimi: moonshot/kimi-latest
  qwen-turbo: qwen/qwen-turbo
  qwen-plus: qwen/qwen-plus
  # STT-first: enable after capabilities.audio_transcribe: true on groq (see docs/providers/groq-stt.md)
  whisper-fast: groq/whisper-large-v3

# Optional edge auth (off by default). When enabled, every route except GET /healthz
# requires Authorization: Bearer <key> or x-api-key matching keys / keys_env.
# Prefer keys_env in production (comma-separated). Distinct from provider api_key_env:
# with api_key_env set, clients only need the edge key; upstream uses the env secret.
# edge_auth:
#   enabled: true
#   keys_env: GATEWAY_EDGE_KEYS
#   # keys: ["local-dev-only-key"]

# Realtime session caps (process-local; defaults shown)
# realtime:
#   max_sessions: 1024
#   max_session_minutes: 60

# Realtime WebSocket process limits (OpenAI Realtime + Google Live)
realtime:
  max_sessions: 1024
  max_session_minutes: 60

# Optional request/response body cap (bytes). Default 33554432 (32 MiB).
# Oversize requests → HTTP 413 with a dialect-shaped error. Raise only if you
# accept higher peak memory (bodies are buffered for model rewrite / translation).
# max_body_bytes: 33554432

hooks:
  jsonl:
    output: stdout             # stdout | stderr | path  (prefer stdout in containers)
  # webhook:                   # async POST of the same UsageEvent JSON
  #   url: "https://billing.example.com/ingest"
  #   timeout: 3s
