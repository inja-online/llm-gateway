site_name: Inja LLM Gateway
site_description: Multi-dialect LLM API gateway — OpenAI, Anthropic, Gemini · multi-provider routing · usage hooks
site_url: https://inja-online.github.io/llm-gateway/
repo_url: https://github.com/inja-online/llm-gateway
repo_name: inja-online/llm-gateway
edit_uri: edit/master/docs/
copyright: Copyright &copy; 2026 inja-online — licensed under AGPL-3.0

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/logo.jpg
  favicon: assets/logo.jpg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/inja-online/llm-gateway

nav:
  - Home: index.md
  - Getting started:
      - Install & quickstart: getting-started.md
      - Claude Code: claude-code-checklist.md
  - Reference:
      - Compatibility matrix: compatibility-matrix.md
      - SDK hermetic matrix: sdk-compatibility-matrix.md
      - Deprecation / field drops: deprecation-policy.md
  - Ops & security:
      - Multipart security review: security-multipart-review.md
  - Project:
      - Contributing: contributing.md
      - Changelog: changelog.md
      - License (AGPL-3.0): license.md
